name: Deploy PostgreSQL Docker Compose

on:
  workflow_dispatch:

jobs:
  checkout:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Upload compose file as artifact
        uses: actions/upload-artifact@v4
        with:
          name: postgres-compose
          path: infra/docker/docker-compose.prod2.yml


  transfer:
    runs-on: ubuntu-latest
    needs: checkout

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: postgres-compose
          path: ./artifact

      - name: Copy project to VPS
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "./infra/docker/docker-compose.prod2.yml"
          target: "/home/${{ secrets.VPS_USER }}/infra/docker/"


  deploy:
    runs-on: ubuntu-latest
    needs: transfer
    environment: prod

    steps:
      - name: Move file to /opt and deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            sudo mkdir -p /opt/postgres
            sudo mv /home/${{ secrets.VPS_USER }}/infra/docker/docker-compose.prod2.yml /opt/postgres/
            sudo chown -R $USER:$USER /opt/postgres

            cd /opt/postgres

            export POSTGRES_USER=${{ secrets.POSTGRES_USER }}
            export POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            export POSTGRES_PORT=${{ secrets.POSTGRES_PORT }}

            docker compose -p prod-test -f docker-compose.prod2.yml up -d

            echo "Deployment complete"