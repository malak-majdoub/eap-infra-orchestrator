name: Deploy PostgreSQL Docker Compose

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Copy project to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "./infra/docker/docker-compose.prod2.yml"
          target: "/opt/postgres/docker-compose.prod2.yml"
          # rm: true   # 🔥 ensures old files are removed

      # Deploy using docker compose
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/postgres
            docker compose -p prod-test -f docker-compose.prod2.yml up -d
            echo "Deployment complete"